aid: markforged
url: https://raw.githubusercontent.com/api-evangelist/markforged/refs/heads/main/apis.yml
name: Markforged
kind: company
description: Markforged builds industrial additive manufacturing systems - composite
  (FX, Onyx, X-series) and metal (Metal X, PX100) 3D printers - managed through the
  Eiger cloud software platform. The Eiger API (V3) exposes a REST interface over
  HTTP Basic Auth for managing devices, builds, print jobs, and parts, letting
  customers integrate Markforged additive workflows into ERP, MES, PLM, and other
  factory systems. Digital Source extends the platform with secure, licensed
  distribution of manufacturer-certified parts for distributed manufacturing.
