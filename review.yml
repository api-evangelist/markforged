sources:
  - url: https://www.eiger.io/developer
    type: Documentation
    note: Eiger API V3 developer landing page.
  - url: https://www.eiger.io/developer/spec
    type: APIReference
    note: Eiger API V3 reference; RESTful, JSON responses, OpenAPI-described, base URL https://www.eiger.io/api/v3, HTTP Basic Auth.
  - url: https://support.markforged.com/portal/s/article/Eiger-API
    type: Documentation
    note: Markforged support article on the Eiger API (portal-gated rendering).
  - url: https://markforged.com/management-integration
    type: Documentation
    note: Describes integrating factory systems (ERP, MES, PLM) with Markforged via the Eiger API.
  - url: https://markforged.com/resources/markforged-unlocks-the-future-of-distributed-manufacturing-enabling-manufacturer-certified-parts-to-be-licensed-and-printed-at-the-point-of-need
    type: Documentation
    note: Digital Source platform announcement; no separate public developer API documented.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Cataloged the publicly documented Eiger API V3 across six sub-API resource
    groups (Devices, Builds, Print Jobs, Parts, Printed Parts, Organizations)
    plus a Digital Source product entry without a fabricated API. An OpenAPI
    3.0.1 document was authored modeling the 30 documented REST endpoints with
    HTTP Basic Auth. Plans, rate limits, and FinOps are marked reconciled:false
    because Markforged does not publish self-serve software/API pricing or
    rate-limit values.
