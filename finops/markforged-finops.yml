serviceCategory: Manufacturing and Additive Manufacturing
billingModel:
  pricingCategory: Subscription and Purchase
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Eiger
  ServiceCategory: Manufacturing and Additive Manufacturing
