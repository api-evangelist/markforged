description: >-
  FinOps view of Markforged spend. Markforged is a hardware-plus-software
  additive manufacturing vendor: cost is driven by printer capital purchases,
  consumable materials, and Eiger software subscriptions (Eiger / Eiger Fleet),
  plus Digital Source licensing for distributed manufacturing. The Eiger API V3
  is a platform capability for customers and is not separately metered or
  billed per call. No public usage-based API pricing exists to reconcile.
notes: >-
  Markforged does not publish self-serve or usage-based pricing; hardware,
  materials, software, and Digital Source are quoted via sales and resellers.
  Cost dimensions below are structural and not reconciled to published rates.
sources:
- https://markforged.com
- https://markforged.com/software
- https://www.eiger.io/developer
- https://focus.finops.org/focus-specification/v1-3/
