meters:
- name: printer_hardware
  description: Capital purchase of composite or metal 3D printers, billed per unit at quote.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - printer_model
- name: consumable_materials
  description: Consumable filament/material spend, billed per spool/cartridge.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - material
- name: eiger_subscription
  description: Eiger / Eiger Fleet software subscription, billed per term.
  unit: subscriptions
  aggregation: sum
  dimensions:
  - account
  - tier
- name: digital_source_licensing
  description: Digital Source part licensing for distributed manufacturing, negotiated per agreement.
  unit: licenses
  aggregation: sum
  dimensions:
  - account
  - part
principles:
- name: Visibility
  description: Track printer fleet utilization, material consumption, and Eiger subscription terms against budget.
- name: Allocation
  description: Map printers, materials, and Eiger seats to cost centers, sites, and programs.
- name: Optimization
  description: Use Eiger Fleet scheduling and the Eiger API to maximize printer utilization and reduce material waste; consider Digital Source to avoid physical inventory carrying cost.
- name: Accountability
  description: Assign owners per site/fleet; review hardware, material, and software spend against additive program ROI.
